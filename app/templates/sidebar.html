<aside class="sidebar">
    <!-- Logo -->
    <div style="padding:20px 16px 16px;border-bottom:1px solid var(--border);">
        <div class="flex items-center gap-3">
            <div style="width:34px;height:34px;background:var(--accent-grad);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(124,58,237,.4);">
                <i class="fa-solid fa-shield-halved" style="color:white;font-size:14px;"></i>
            </div>
            <div>
                <div style="font-size:13px;font-weight:800;color:var(--text-1);letter-spacing:.01em;">HRMS Core</div>
                <div style="font-size:10px;font-weight:600;color:var(--accent-bright);letter-spacing:.06em;text-transform:uppercase;">Enterprise v2.4</div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav style="padding:12px 10px;flex:1;overflow-y:auto;">
        <div style="font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding:0 6px;margin-bottom:8px;">Workspace</div>

        <a href="/view/dashboard" class="nav-item" id="nav-dash">
            <i class="fa-solid fa-chart-pie"></i> Dashboard
        </a>
        <a href="/view/employees" class="nav-item" id="nav-emp">
            <i class="fa-solid fa-users"></i> Employees
        </a>
        <a href="/view/attendance" class="nav-item" id="nav-att">
            <i class="fa-solid fa-clock"></i> Attendance
        </a>
        <a href="/view/leaves" class="nav-item" id="nav-lv">
            <i class="fa-solid fa-calendar-xmark"></i> Leave Requests
        </a>

        <div class="divider"></div>
        <div style="font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding:0 6px;margin-bottom:8px;">Preferences</div>

        <button class="nav-item" onclick="toggleThemeMode()" style="width:100%;">
            <i id="themeIcon" class="fa-solid fa-sun"></i>
            <span id="themeLabel">Light Mode</span>
            <!-- Mini toggle pill -->
            <div id="themePill" style="margin-left:auto;width:32px;height:18px;background:var(--border);border-radius:99px;position:relative;transition:background .2s;flex-shrink:0;">
                <div id="themeDot" style="position:absolute;top:3px;left:3px;width:12px;height:12px;background:var(--text-3);border-radius:50%;transition:transform .2s,background .2s;"></div>
            </div>
        </button>
    </nav>

    <!-- User profile -->
    <div style="padding:10px;border-top:1px solid var(--border);">
        <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;">
            <div class="flex items-center gap-3" style="margin-bottom:10px;">
                <div id="sb-avatar" class="avatar avatar-md" style="background:var(--accent-glow);border:1px solid var(--border-bright);color:var(--accent-bright);">A</div>
                <div style="min-width:0;flex:1;">
                    <div id="sb-name" class="truncate" style="font-size:13px;font-weight:700;color:var(--text-1);">Admin</div>
                    <div id="sb-role" style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent-bright);margin-top:1px;">Admin</div>
                </div>
                <div class="pulse" style="width:7px;height:7px;background:var(--success);border-radius:50%;flex-shrink:0;"></div>
            </div>
            <button onclick="handleLogout()" class="btn btn-danger-soft btn-sm w-full" style="justify-content:center;width:100%;">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out
            </button>
        </div>
    </div>
</aside>

<script>
(function initSidebar() {
    // ── Active nav link ──
    const path = window.location.pathname;
    const map = {
        '/view/dashboard': 'nav-dash',
        '/view/employees': 'nav-emp',
        '/view/attendance': 'nav-att',
        '/view/leaves': 'nav-lv'
    };
    const activeId = map[path];
    if (activeId) {
        const el = document.getElementById(activeId);
        if (el) el.classList.add('active');
    }

    // ── User identity ──
    const claims = getAuthenticatedIdentityClaims();
    if (claims) {
        const name = claims.sub || 'User';
        const role = claims.role || 'employee';
        const n = document.getElementById('sb-name'); if (n) n.textContent = name;
        const r = document.getElementById('sb-role'); if (r) r.textContent = role;
        const a = document.getElementById('sb-avatar'); if (a) a.textContent = name.charAt(0).toUpperCase();
    }

    // ── Sync theme toggle pill UI ──
    syncThemePill();
})();

function syncThemePill() {
    const t = localStorage.getItem('hrms_theme') || 'dark';
    const icon = document.getElementById('themeIcon');
    const label = document.getElementById('themeLabel');
    const pill = document.getElementById('themePill');
    const dot = document.getElementById('themeDot');

    if (t === 'light') {
        if (icon) icon.className = 'fa-solid fa-moon';
        if (label) label.textContent = 'Dark Mode';
        if (pill) pill.style.background = '#7c3aed';
        if (dot) { dot.style.transform = 'translateX(14px)'; dot.style.background = 'white'; }
    } else {
        if (icon) icon.className = 'fa-solid fa-sun';
        if (label) label.textContent = 'Light Mode';
        if (pill) pill.style.background = 'var(--border)';
        if (dot) { dot.style.transform = 'translateX(0)'; dot.style.background = 'var(--text-3)'; }
    }
}

// Override toggleThemeMode to also sync pill
// Full theme apply function
function applyTheme(t) {
    if (t === 'light') {
        document.body.classList.add('light-mode');
        document.body.style.background = '#f0f4ff';
        document.documentElement.style.background = '#f0f4ff';
        document.documentElement.style.setProperty('--bg-root', '#f0f4ff');
        document.documentElement.style.setProperty('--bg-surface', '#ffffff');
        document.documentElement.style.setProperty('--bg-card', '#ffffff');
        document.documentElement.style.setProperty('--bg-elevated', '#f1f5ff');
        document.documentElement.style.setProperty('--bg-hover', '#e8ecff');
        document.documentElement.style.setProperty('--text-1', '#0f172a');
        document.documentElement.style.setProperty('--text-2', '#334155');
        document.documentElement.style.setProperty('--text-3', '#64748b');
        document.documentElement.style.setProperty('--border', 'rgba(124,58,237,0.15)');
        document.documentElement.style.setProperty('--border-bright', 'rgba(124,58,237,0.3)');
        document.documentElement.style.setProperty('--accent-bright', '#6d28d9');
        document.documentElement.style.setProperty('--accent-glow', 'rgba(124,58,237,0.1)');
        document.documentElement.style.setProperty('--shadow-card', '0 2px 16px rgba(124,58,237,0.1)');
        // Force all page sections to light
        document.querySelectorAll('.page-body,.sidebar,.stat-card,.card,.data-table th').forEach(function(el) {
            el.style.background = '';
        });
    } else {
        document.body.classList.remove('light-mode');
        document.body.style.background = '#0d0b2e';
        document.documentElement.style.background = '#0d0b2e';
        document.documentElement.style.setProperty('--bg-root', '#0d0b2e');
        document.documentElement.style.setProperty('--bg-surface', '#110e38');
        document.documentElement.style.setProperty('--bg-card', '#161245');
        document.documentElement.style.setProperty('--bg-elevated', '#1c1752');
        document.documentElement.style.setProperty('--bg-hover', '#221d60');
        document.documentElement.style.setProperty('--text-1', '#ffffff');
        document.documentElement.style.setProperty('--text-2', '#c4b5fd');
        document.documentElement.style.setProperty('--text-3', '#9d8df1');
        document.documentElement.style.setProperty('--border', 'rgba(139,92,246,0.12)');
        document.documentElement.style.setProperty('--border-bright', 'rgba(139,92,246,0.3)');
        document.documentElement.style.setProperty('--accent-bright', '#a78bfa');
        document.documentElement.style.setProperty('--accent-glow', 'rgba(124,58,237,0.18)');
        document.documentElement.style.setProperty('--shadow-card', '0 4px 24px rgba(0,0,0,0.3)');
    }
    localStorage.setItem('hrms_theme', t);
    syncThemePill();
}

window.toggleThemeMode = function() {
    const cur = localStorage.getItem('hrms_theme') || 'dark';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
};

// Apply saved theme on page load
applyTheme(localStorage.getItem('hrms_theme') || 'dark');
</script>
