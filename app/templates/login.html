{% extends 'base.html' %}
{% block title %}Enterprise Portal Core Authentication Verification Engine{% endblock %}
{% block content %}
<div class="min-h-screen w-full flex flex-col items-center justify-center bg-[#0b0f19] p-6 sm:p-12 overflow-y-auto">
    <div class="w-full max-w-md my-auto py-4">
        
        <div class="text-center mb-8">
            <div class="h-14 w-14 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center text-white text-2xl shadow-xl shadow-indigo-500/20 mb-4 animate-bounce">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white">Welcome back</h1>
            <p class="text-sm text-slate-400 mt-2">Enter credentials to verify identity verification context.</p>
        </div>

        <div class="glass-panel p-8 rounded-3xl shadow-2xl relative overflow-hidden bg-[#111827]/60 border border-slate-800">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
            
            <form id="portalLoginForm" class="space-y-5">
                <div>
                    <label class="block text-xs uppercase font-bold text-slate-400 tracking-wider mb-2">Username Handle</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-user-shield"></i>
                        </span>
                        <input type="text" id="inputUsername" required class="w-full bg-[#1f2937]/50 border border-slate-700/50 rounded-xl py-3 pl-11 pr-4 text-sm outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all text-white" placeholder="admin">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-xs uppercase font-bold text-slate-400 tracking-wider">Access Secret Pin</label>
                        <a href="#" class="text-xs font-semibold text-indigo-400 hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-key"></i>
                        </span>
                        <input type="password" id="inputPassword" required class="w-full bg-[#1f2937]/50 border border-slate-700/50 rounded-xl py-3 pl-11 pr-4 text-sm outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all text-white" placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="rememberMe" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-700 rounded-sm bg-transparent">
                    <label for="rememberMe" class="ml-2 block text-xs font-semibold text-slate-400">Validate device identity for 30 execution cycles</label>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 active:transform active:scale-[0.99] text-white font-semibold py-3.5 px-4 rounded-xl text-sm transition-all shadow-lg shadow-indigo-600/20 flex items-center justify-center gap-2 cursor-pointer">
                    <span>Verify Identity Pipeline</span> <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </form>
        </div>

    </div>
</div>

<script>
    document.getElementById('portalLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Processing Cryptographic Check...';

        const username = document.getElementById('inputUsername').value;
        const password = document.getElementById('inputPassword').value;

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (res.ok) {
                // MATCHING KEY SYNC: Save exactly what the dashboard and base files expect
                localStorage.setItem('access_token', data.access_token);
                
                // Route seamlessly through the security interceptor
                window.location.href = '/view/dashboard';
            } else {
                alert(data.error || "Authentication Exception Engine Block.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Verify Identity Pipeline</span> <i class="fa-solid fa-arrow-right text-xs"></i>';
            }
        } catch(err) {
            console.error(err);
            alert("Critical communication layer exception mapping fault.");
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span>Verify Identity Pipeline</span> <i class="fa-solid fa-arrow-right text-xs"></i>';
        }
    });
</script>
{% endblock %}
