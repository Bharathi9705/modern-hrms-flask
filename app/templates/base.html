<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HRMS Portal{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #0b0f19; }
        .glass-panel {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 3px; }
    </style>
</head>
<body class="bg-[#0b0f19] text-white min-h-screen">

{% block content %}{% endblock %}

<script>
    async function runAuthenticatedSecureTransaction(url, options = {}) {
        const token = localStorage.getItem('access_token');
        if (!token && window.location.pathname !== '/') {
            window.location.href = '/';
            return null;
        }
        options.headers = {
            ...options.headers,
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        };
        try {
            const response = await fetch(url, options);
            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('access_token');
                window.location.href = '/';
                return null;
            }
            return response;
        } catch (err) {
            console.error("Network error:", err);
            return null;
        }
    }

    function getAuthenticatedIdentityClaims() {
        const token = localStorage.getItem('access_token');
        if (!token) return null;
        try {
            return JSON.parse(window.atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        } catch(e) { return null; }
    }

    function handleLogout() {
        localStorage.removeItem('access_token');
        window.location.href = '/';
    }
</script>

</body>
</html>
